<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECONNECT-US TV Hub</title>
<style>
:root{
  --bg:#08111f;--panel:#101d33;--card:#142744;--card2:#0e1a2e;--text:#f4f8ff;--muted:#b9c7d9;
  --blue:#2f80ed;--teal:#00b4b8;--orange:#ff9f1c;--shadow:0 22px 55px rgba(0,0,0,.42);--radius:24px;
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top left,#17365f 0,#08111f 45%,#050914 100%);color:var(--text)}
header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(8,17,31,.92);border-bottom:1px solid rgba(255,255,255,.1)}
.brand{display:flex;align-items:center;gap:12px}.logo{width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,var(--blue),var(--teal));display:grid;place-items:center;font-weight:900;font-size:20px;box-shadow:var(--shadow)}
h1{margin:0;font-size:clamp(24px,4vw,38px)}.tag{margin-top:3px;color:var(--muted);font-size:14px}
button,.button{border:0;border-radius:15px;padding:12px 15px;background:linear-gradient(135deg,var(--blue),var(--teal));color:white;font-weight:900;font-size:16px;cursor:pointer;text-decoration:none}
.top{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
main{max-width:1100px;margin:0 auto;padding:24px 16px 90px}
.hero{background:linear-gradient(135deg,rgba(47,128,237,.22),rgba(0,180,184,.14));border:1px solid rgba(255,255,255,.12);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);text-align:center}
.hero h2{font-size:clamp(30px,6vw,56px);margin:0 0 10px}.hero p{font-size:19px;line-height:1.45;color:var(--muted);margin:0 auto;max-width:720px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin-top:24px}
.tile{min-height:270px;background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid rgba(255,255,255,.11);border-radius:var(--radius);padding:24px;text-decoration:none;color:var(--text);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.tile:hover{transform:translateY(-2px);filter:brightness(1.08)}
.icon{width:110px;height:110px;border-radius:30px;background:linear-gradient(135deg,var(--orange),#ff7a00);display:grid;place-items:center;font-size:56px;margin-bottom:18px;box-shadow:0 16px 35px rgba(0,0,0,.35)}
.tile h3{font-size:34px;margin:0 0 8px}.tile p{margin:0;color:var(--muted);font-size:17px;line-height:1.4}
.footer{position:fixed;left:0;right:0;bottom:0;padding:11px 16px;text-align:center;color:var(--muted);background:rgba(8,17,31,.94);border-top:1px solid rgba(255,255,255,.1);font-size:13px}
@media(max-width:560px){header{align-items:flex-start;flex-direction:column}.top{width:100%}.top a,.top button{flex:1;text-align:center}.tile{min-height:220px}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo">RU</div>
    <div>
      <h1>RECONNECT-US TV Hub</h1>
      <div class="tag">TV Section Home Screen</div>
    </div>
  </div>
  <div class="top">
    <a class="button" href="../index.html">← Home</a>
    <button onclick="toggleFullScreen()">⛶ Full Screen</button>
  </div>
</header>

<main>
  <section class="hero">
    <h2>TV Hub</h2>
    <p>Open the password-protected TV app. It contains the TV and streaming service tiles.</p>
  </section>

  <section class="grid">
    <a class="tile" href="tv-hub.html">
      <div class="icon">📺</div>
      <h3>Open TV App</h3>
      <p>BBC iPlayer, ITVX, Channel 4, Channel 5, Netflix, U, Filmzie, Plex, Pluto TV and YouTube.</p>
    </a>
  </section>
</main>

<div class="footer">© RECONNECT-US — All rights reserved.</div>
<script>
function toggleFullScreen(){
  if(!document.fullscreenElement){document.documentElement.requestFullscreen?.();}
  else{document.exitFullscreen?.();}
}
</script>
</body>
</html>
