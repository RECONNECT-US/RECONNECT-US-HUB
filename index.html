<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECONNECT-US TV Home</title>
<style>
:root{
  --bg:#08111f;
  --panel:#101d33;
  --text:#f4f8ff;
  --muted:#b9c7d9;
  --blue:#2f80ed;
  --teal:#00b4b8;
  --orange:#ff9f1c;
  --shadow:0 24px 60px rgba(0,0,0,.42);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:Arial,Helvetica,sans-serif;
  background:radial-gradient(circle at top left,#17365f 0,#08111f 46%,#050914 100%);
  color:var(--text);
  display:flex;
  flex-direction:column;
}
header{
  padding:14px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  background:rgba(8,17,31,.92);
  border-bottom:1px solid rgba(255,255,255,.1);
}
.brand{
  display:flex;
  align-items:center;
  gap:12px;
}
.logo{
  width:52px;
  height:52px;
  border-radius:16px;
  background:linear-gradient(135deg,var(--blue),var(--teal));
  display:grid;
  place-items:center;
  font-weight:900;
  font-size:20px;
  box-shadow:var(--shadow);
}
h1{
  margin:0;
  font-size:clamp(22px,4vw,34px);
}
.tag{
  margin-top:3px;
  color:var(--muted);
  font-size:14px;
}
button,.button{
  border:0;
  border-radius:15px;
  padding:12px 15px;
  background:linear-gradient(135deg,var(--blue),var(--teal));
  color:white;
  font-weight:900;
  font-size:16px;
  cursor:pointer;
  text-decoration:none;
}
main{
  flex:1;
  display:grid;
  place-items:center;
  padding:24px 16px 80px;
}
.homeCard{
  width:min(620px,100%);
  background:linear-gradient(180deg,#142744,#0e1a2e);
  border:1px solid rgba(255,255,255,.12);
  border-radius:30px;
  padding:30px;
  box-shadow:var(--shadow);
  text-align:center;
}
.tvIcon{
  width:120px;
  height:120px;
  margin:0 auto 18px;
  border-radius:30px;
  background:linear-gradient(135deg,#2f80ed,#00b4b8);
  display:grid;
  place-items:center;
  font-size:58px;
  box-shadow:0 16px 35px rgba(0,0,0,.35);
}
.homeCard h2{
  margin:0 0 10px;
  font-size:clamp(30px,7vw,52px);
}
.homeCard p{
  margin:0 auto 22px;
  max-width:460px;
  color:var(--muted);
  font-size:19px;
  line-height:1.45;
}
.openBtn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:min(360px,100%);
  padding:18px 20px;
  border-radius:20px;
  background:linear-gradient(135deg,var(--orange),#ff7a00);
  color:white;
  font-size:22px;
  font-weight:900;
  text-decoration:none;
  box-shadow:0 14px 30px rgba(0,0,0,.32);
}
.openBtn:hover,button:hover{
  transform:translateY(-1px);
  filter:brightness(1.08);
}
.smallText{
  margin-top:16px;
  color:var(--muted);
  font-size:14px;
}
.footer{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  padding:11px 16px;
  text-align:center;
  color:var(--muted);
  background:rgba(8,17,31,.94);
  border-top:1px solid rgba(255,255,255,.1);
  font-size:13px;
}
@media(max-width:560px){
  header{align-items:flex-start;flex-direction:column}
  button{width:100%}
  .homeCard{padding:24px 18px}
}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo">RU</div>
    <div>
      <h1>RECONNECT-US</h1>
      <div class="tag">TV App Home Screen</div>
    </div>
  </div>
  <button onclick="toggleFullScreen()">⛶ Full Screen</button>
</header>

<main>
  <section class="homeCard">
    <div class="tvIcon">📺</div>
    <h2>TV Hub</h2>
    <p>Open the RECONNECT-US TV Hub for BBC iPlayer, ITVX, Channel 4, Channel 5, Netflix, U, Filmzie, Plex, Pluto TV and YouTube.</p>
    <a class="openBtn" href="reconnect-us-tv-hub-password-updated.html">Open TV Hub</a>
    <div class="smallText">Password protected app • RECONNECT-US</div>
  </section>
</main>

<div class="footer">© RECONNECT-US — All rights reserved.</div>

<script>
function toggleFullScreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen?.();
  }else{
    document.exitFullscreen?.();
  }
}
</script>
</body>
</html>
